name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  php-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: PHP syntax check
        run: find sdk/php gateway -name '*.php' -print0 | xargs -0 -n1 php -l

  node-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node --check sdk/node/src/index.js

  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: cd sdk/go && go build ./...
